<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>Enlace · Meu Planejamento</title>
  <link rel="manifest" href="manifest-cliente.json" />
  <meta name="theme-color" content="#6E2A52" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500;1,600&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6E2A52;
      --primary-light: #8A3D63;
      --primary-dark: #45203A;
      --secondary: #B5658A;
      --gold: #C2A35E;
      --gold-soft: #E4D2A8;
      --blush: #F4E6EC;
      --ivory: #FBF7F3;
      --ink: #1A1620;
      --gray-700: #5A4E58;
      --gray-600: #7A6E76;
      --gray-500: #9A8E96;
      --gray-200: #E7DCE2;
      --gray-100: #EFE7EB;
      --white: #FFFFFF;
      --success: #4F8A6B;
      --danger: #C2453F;
      --warning: #C98A3A;
      --shadow-glass: 0 8px 32px rgba(0, 0, 0, 0.06);
      --shadow-xl: 0 20px 60px rgba(26, 22, 32, 0.12);
      --transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      --radius: 24px;
      --radius-sm: 14px;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--ivory);
      color: var(--ink);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .app-container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 1440px;
      margin: 0 auto;
      padding: 1.5rem;
      position: relative;
    }

    /* Top Bar */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 1.5rem;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: 80px;
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: var(--shadow-glass);
      margin-bottom: 2rem;
      flex-shrink: 0;
    }
    .top-bar .greeting {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .top-bar .greeting h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 700;
    }
    .top-bar .greeting h2 span {
      color: var(--primary);
    }
    .top-bar .user-actions {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .avatar-glass {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--gold));
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 1.1rem;
      box-shadow: 0 4px 12px rgba(110, 42, 82, 0.2);
    }
    .btn-logout-glass {
      background: transparent;
      border: none;
      color: var(--gray-500);
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      padding: 0.3rem 0.8rem;
      border-radius: 999px;
      transition: var(--transition);
    }
    .btn-logout-glass:hover {
      background: rgba(194, 69, 63, 0.1);
      color: var(--danger);
    }

    /* Search */
    .search-sticky {
      background: var(--white);
      border-radius: 60px;
      padding: 0.3rem 0.3rem 0.3rem 1.8rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      box-shadow: var(--shadow-glass);
      border: 1px solid var(--gray-100);
      margin-bottom: 2rem;
      flex-shrink: 0;
    }
    .search-sticky input {
      border: none;
      flex: 1;
      padding: 0.8rem 0;
      font-size: 0.95rem;
      background: transparent;
      outline: none;
      font-family: inherit;
      color: var(--ink);
    }
    .search-sticky input::placeholder {
      color: var(--gray-500);
    }
    .search-sticky button {
      background: linear-gradient(135deg, var(--primary), var(--primary-light));
      color: white;
      border: none;
      padding: 0.6rem 1.8rem;
      border-radius: 999px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: var(--transition);
      white-space: nowrap;
    }
    .search-sticky button:hover {
      transform: scale(1.03);
      box-shadow: 0 4px 16px rgba(110, 42, 82, 0.3);
    }

    /* Stats */
    .stats-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-shrink: 0;
    }
    .stat-chip {
      background: var(--white);
      padding: 0.5rem 1.2rem;
      border-radius: 999px;
      border: 1px solid var(--gray-200);
      box-shadow: var(--shadow-glass);
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .stat-chip .num {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--primary);
    }

    /* Main Grid */
    .main-grid {
      display: grid;
      grid-template-columns: 1.6fr 1fr;
      gap: 2rem;
      flex: 1;
      overflow: hidden;
      min-height: 0;
    }

    /* Masonry */
    .vendor-masonry {
      overflow-y: auto;
      padding-right: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }
    .vendor-masonry .masonry-grid {
      column-count: 2;
      column-gap: 1.5rem;
    }
    .vendor-masonry .masonry-grid .vendor-card-masonry {
      break-inside: avoid;
      margin-bottom: 1.5rem;
      background: var(--white);
      border-radius: 20px;
      padding: 1.2rem;
      border: 1px solid var(--gray-100);
      box-shadow: var(--shadow-glass);
      transition: var(--transition);
      cursor: pointer;
    }
    .vendor-masonry .masonry-grid .vendor-card-masonry:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-xl);
      border-color: var(--gold);
    }
    .vendor-masonry .masonry-grid .vendor-card-masonry .monogram {
      width: 48px;
      height: 48px;
      background: var(--blush);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }
    .vendor-masonry .masonry-grid .vendor-card-masonry h4 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 700;
    }
    .vendor-masonry .masonry-grid .vendor-card-masonry p {
      font-size: 0.85rem;
      color: var(--gray-600);
      margin: 0.3rem 0;
    }
    .vendor-masonry .masonry-grid .vendor-card-masonry .price-tag {
      display: inline-block;
      background: var(--primary);
      color: white;
      padding: 0.2rem 0.8rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-top: 0.5rem;
    }

    /* Timeline */
    .activity-timeline {
      overflow-y: auto;
      padding-left: 0.5rem;
      border-left: 2px dashed var(--gray-200);
    }
    .timeline-item {
      position: relative;
      padding-left: 1.5rem;
      padding-bottom: 1.8rem;
    }
    .timeline-item::before {
      content: '';
      position: absolute;
      left: -6px;
      top: 6px;
      width: 10px;
      height: 10px;
      background: var(--gold);
      border-radius: 50%;
      border: 2px solid var(--white);
      box-shadow: 0 0 0 2px var(--gold);
    }
    .timeline-item .date {
      font-size: 0.7rem;
      color: var(--gray-500);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }
    .timeline-item .content {
      background: var(--white);
      padding: 0.8rem 1rem;
      border-radius: 14px;
      box-shadow: var(--shadow-glass);
      border: 1px solid var(--gray-100);
      margin-top: 0.2rem;
    }
    .timeline-item .content strong {
      display: block;
      font-size: 0.95rem;
    }
    .timeline-item .content .meta {
      font-size: 0.8rem;
      color: var(--gray-600);
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-top: 0.2rem;
    }
    .badge-status {
      font-size: 0.6rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 0.1rem 0.6rem;
      border-radius: 999px;
      background: var(--gray-200);
      color: var(--gray-600);
    }
    .badge-status.pending {
      background: var(--warning);
      color: white;
    }
    .badge-status.active {
      background: var(--primary);
      color: white;
    }
    .badge-status.completed {
      background: var(--success);
      color: white;
    }

    /* Dock */
    .dock-floating {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: 0 8px 40px rgba(26, 22, 32, 0.12);
      display: flex;
      padding: 0.4rem 0.6rem;
      gap: 0.2rem;
      z-index: 999;
    }
    .dock-item {
      padding: 0.6rem 1.2rem;
      border-radius: 40px;
      border: none;
      background: transparent;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--gray-600);
      display: flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      transition: var(--transition);
      font-family: inherit;
    }
    .dock-item .icon {
      font-size: 1.2rem;
    }
    .dock-item.active {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 16px rgba(110, 42, 82, 0.3);
    }
    .dock-item:not(.active):hover {
      background: rgba(110, 42, 82, 0.08);
      color: var(--ink);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26, 22, 32, 0.4);
      backdrop-filter: blur(8px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .modal.show {
      display: flex;
    }
    .modal-content {
      background: var(--white);
      border-radius: 32px;
      padding: 2rem;
      max-width: 480px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-xl);
    }
    .modal-header {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }
    .form-group {
      margin-bottom: 1rem;
    }
    .form-group label {
      font-weight: 600;
      font-size: 0.85rem;
      display: block;
      margin-bottom: 0.3rem;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 0.7rem 1rem;
      border: 1px solid var(--gray-200);
      border-radius: 16px;
      font-family: inherit;
      transition: var(--transition);
    }
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(110, 42, 82, 0.1);
    }
    .modal-actions {
      display: flex;
      gap: 0.8rem;
      margin-top: 1.5rem;
    }
    .modal-actions button {
      flex: 1;
      padding: 0.8rem;
      border-radius: 999px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
    }
    .modal-actions .btn-primary-modal {
      background: var(--primary);
      color: white;
    }
    .modal-actions .btn-primary-modal:hover {
      transform: scale(1.02);
    }
    .modal-actions .btn-secondary-modal {
      background: var(--gray-100);
      color: var(--ink);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 8rem;
      right: 2rem;
      background: var(--white);
      padding: 0.8rem 1.5rem;
      border-radius: 60px;
      box-shadow: var(--shadow-xl);
      border-left: 4px solid var(--primary);
      display: none;
      align-items: center;
      gap: 0.8rem;
      z-index: 2000;
    }
    .toast.show {
      display: flex;
    }
    .toast.success {
      border-left-color: var(--success);
    }
    .toast.error {
      border-left-color: var(--danger);
    }

    /* Auth */
    .auth-shell {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(145deg, var(--ivory), #f5eae3);
      padding: 1.5rem;
    }
    .auth-card {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(20px);
      border-radius: 48px;
      padding: 2.5rem;
      max-width: 420px;
      width: 100%;
      box-shadow: var(--shadow-xl);
      border: 1px solid rgba(255, 255, 255, 0.5);
    }
    .auth-card h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.8rem;
      margin-bottom: 0.5rem;
      color: var(--primary);
    }
    .auth-card .sub {
      color: var(--gray-600);
      margin-bottom: 2rem;
    }
    .auth-card .form-group input {
      border-radius: 999px;
      padding: 0.9rem 1.5rem;
    }
    .auth-card .btn-primary-auth {
      width: 100%;
      padding: 0.9rem;
      border: none;
      background: var(--primary);
      color: white;
      border-radius: 999px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: var(--transition);
    }
    .auth-card .btn-primary-auth:hover {
      transform: scale(1.02);
      box-shadow: 0 8px 24px rgba(110, 42, 82, 0.3);
    }
    .auth-card .btn-ghost-auth {
      width: 100%;
      padding: 0.9rem;
      border: 1px solid var(--gray-200);
      background: transparent;
      border-radius: 999px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: var(--transition);
    }
    .auth-card .btn-ghost-auth:hover {
      background: var(--gray-100);
    }
    #authShell {
      display: none;
    }
    #appShell {
      display: none;
      flex-direction: column;
      height: 100vh;
    }

    /* Responsive */
    @media (max-width: 968px) {
      .main-grid {
        grid-template-columns: 1fr;
        overflow-y: auto;
      }
      .activity-timeline {
        border-left: none;
        padding-left: 0;
      }
      .vendor-masonry .masonry-grid {
        column-count: 1;
      }
      .dock-floating {
        bottom: 1rem;
        padding: 0.2rem 0.4rem;
        gap: 0;
        width: 90%;
        justify-content: space-around;
      }
      .dock-item {
        padding: 0.4rem 0.8rem;
        font-size: 0.7rem;
      }
      .dock-item .icon {
        font-size: 1rem;
      }
      .dock-item span:not(.icon) {
        display: none;
      }
      .top-bar {
        flex-wrap: wrap;
        border-radius: 30px;
        padding: 0.8rem 1rem;
        gap: 0.5rem;
      }
      .search-sticky {
        flex-wrap: wrap;
        border-radius: 30px;
        padding: 0.5rem 1rem;
        background: transparent;
        box-shadow: none;
        border: 1px solid var(--gray-200);
        background: white;
      }
      .search-sticky input {
        width: 100%;
      }
      .search-sticky button {
        width: 100%;
        justify-content: center;
        margin-top: 0.3rem;
      }
      .stats-chips {
        gap: 0.5rem;
      }
      .stat-chip {
        padding: 0.3rem 0.8rem;
        font-size: 0.75rem;
      }
    }
  </style>
</head>
<body>

  <!-- AUTH SHELL -->
  <div class="auth-shell" id="authShell">
    <div class="auth-card">
      <h1>Enlace</h1>
      <p class="sub">Planeje seu casamento com os melhores.</p>
      <div id="loginCard">
        <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="seu@email.com" /></div>
        <div class="form-group"><label>Senha</label><input type="password" id="loginPassword" placeholder="••••••••" /></div>
        <button class="btn-primary-auth" onclick="app.login()">Entrar</button>
        <button class="btn-ghost-auth" onclick="app.showSignup()">Criar conta</button>
      </div>
      <div id="signupCard" style="display:none">
        <div class="form-group"><label>Nome</label><input type="text" id="signupName" placeholder="Seu nome" /></div>
        <div class="form-group"><label>Email</label><input type="email" id="signupEmail" placeholder="seu@email.com" /></div>
        <div class="form-group"><label>Telefone</label><input type="tel" id="signupPhone" placeholder="(00) 99999-9999" /></div>
        <div class="form-group"><label>Cidade</label><input type="text" id="signupRegion" placeholder="Maceió, AL" /></div>
        <div class="form-group"><label>Senha</label><input type="password" id="signupPassword" placeholder="••••••••" /></div>
        <button class="btn-primary-auth" onclick="app.signup()">Criar conta</button>
        <button class="btn-ghost-auth" onclick="app.showLogin()">Voltar</button>
      </div>
    </div>
  </div>

  <!-- APP SHELL -->
  <div id="appShell">
    <div class="app-container">

      <!-- TOP BAR -->
      <div class="top-bar">
        <div class="greeting">
          <div class="avatar-glass" id="userAvatarHeader">C</div>
          <h2>Olá, <span id="dashboardName">Noivo(a)</span></h2>
        </div>
        <div class="user-actions">
          <span style="font-size:0.85rem;color:var(--gray-600);" id="userNameHeader"></span>
          <button class="btn-logout-glass" onclick="app.logout()">Sair</button>
        </div>
      </div>

      <!-- SEARCH -->
      <div class="search-sticky">
        <input type="text" id="searchKeyword" placeholder="Buscar fornecedores por nome ou categoria..." />
        <button onclick="app.filterProfessionals()">Buscar</button>
      </div>

      <!-- STATS -->
      <div class="stats-chips">
        <div class="stat-chip">👥 <span class="num" id="statProf">0</span> Fornecedores</div>
        <div class="stat-chip">📨 <span class="num" id="statReqs">0</span> Solicitações</div>
        <div class="stat-chip">⚡ <span class="num" id="statActive">0</span> Ativos</div>
        <div class="stat-chip">✅ <span class="num" id="statDone">0</span> Concluídos</div>
      </div>

      <!-- MAIN GRID -->
      <div class="main-grid">
        <!-- Esquerda: Fornecedores -->
        <div class="vendor-masonry">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.5rem;">
            <h3 style="font-family:'Cormorant Garamond',serif;font-size:1.4rem;">Disponíveis</h3>
            <button class="dock-item" style="background:var(--primary);color:white;padding:0.3rem 1rem;border-radius:999px;font-size:0.8rem;" onclick="app.openRequestModal()">+ Solicitar</button>
          </div>
          <div class="masonry-grid" id="professionalsGrid">
            <div style="padding:2rem;text-align:center;color:var(--gray-500);width:100%;">Carregando...</div>
          </div>
        </div>

        <!-- Direita: Timeline -->
        <div class="activity-timeline" id="activityTimeline">
          <h3 style="font-family:'Cormorant Garamond',serif;font-size:1.4rem;margin-bottom:1.5rem;">Atividade recente</h3>
          <div id="recentRequestsList">
            <div style="padding:1rem;color:var(--gray-500);">Nenhuma solicitação ainda.</div>
          </div>
        </div>
      </div>

      <!-- DOCK -->
      <div class="dock-floating">
        <button class="dock-item active" data-section="clientDashboard"><span class="icon">📊</span> <span>Início</span></button>
        <button class="dock-item" data-section="searchProfessionals"><span class="icon">🔍</span> <span>Buscar</span></button>
        <button class="dock-item" data-section="myRequests"><span class="icon">📨</span> <span>Pedidos</span></button>
        <button class="dock-item" data-section="clientProfile"><span class="icon">👤</span> <span>Perfil</span></button>
      </div>

      <!-- Hidden sections -->
      <div style="display:none;">
        <section id="clientDashboard"></section>
        <section id="searchProfessionals"></section>
        <section id="myRequests"></section>
        <section id="clientProfile"></section>
      </div>

    </div>
  </div>

  <!-- MODALS -->
  <div class="modal" id="requestModal">
    <div class="modal-content">
      <div class="modal-header">Nova Solicitação</div>
      <div class="form-group"><label>Serviço</label><input type="text" id="requestDesc" placeholder="Ex: Fotografia" /></div>
      <div class="form-group"><label>Data</label><input type="date" id="requestDate" /></div>
      <div class="form-group"><label>Local</label><input type="text" id="requestLocation" placeholder="Cidade" /></div>
      <div class="form-group"><label>Orçamento (R$)</label><input type="number" id="requestBudget" placeholder="1000" /></div>
      <div class="form-group"><label>Detalhes</label><textarea id="requestDetails" rows="3"></textarea></div>
      <div class="modal-actions">
        <button class="btn-primary-modal" onclick="app.createRequest()">Enviar</button>
        <button class="btn-secondary-modal" onclick="app.closeModal('requestModal')">Cancelar</button>
      </div>
    </div>
  </div>

  <div class="modal" id="professionalModal">
    <div class="modal-content" id="professionalDetails"></div>
  </div>

  <div class="toast" id="toast"><span id="toastMsg"></span></div>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js">
  </script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js">
  </script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js">
  </script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCjVxdq2AGRh68Qa_YdbkMEdIRL7E06N8M",
      authDomain: "imobpro-667da.firebaseapp.com",
      databaseURL: "https://imobpro-667da-default-rtdb.firebaseio.com",
      projectId: "imobpro-667da",
      storageBucket: "imobpro-667da.firebasestorage.app",
      messagingSenderId: "827299768500",
      appId: "1:827299768500:web:5935f6ebfd863d376a8fe1"
    };
    try { firebase.initializeApp(firebaseConfig); } catch (e) { console.warn(e); }
    const db = firebase.database();
    const auth = firebase.auth();

    class EventDB {
      static async set(path, data) { const key = data.id || Date.now().toString(); return db.ref(`${path}/${key}`).set({ ...data, id: key }); }
      static on(path, cb) { return db.ref(path).on('value', snap => cb(Object.values(snap.val() || {}))); }
    }

    class ClientApp {
      constructor() { this.currentUser = null; this.professionals = []; this.myRequests = []; this.selectedProfessional = null; }
      escape(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' } [c])); }
      safeId(s) { return String(s == null ? '' : s).replace(/[^A-Za-z0-9_-]/g, ''); }

      async boot() { auth.onAuthStateChanged(fbUser => this.handleAuth(fbUser)); }

      async handleAuth(fbUser) {
        if (!fbUser) { this.currentUser = null; this.showAuth(); return; }
        try {
          const profile = (await db.ref('users/' + fbUser.uid).once('value')).val();
          if (!profile || profile.role !== 'client') { await auth.signOut(); this.showAuth(); return; }
          this.currentUser = profile;
          if (!this._wired) { this.setupListeners(); this._wired = true; }
          this.showApp();
          document.getElementById('dashboardName').textContent = profile.name || 'Noivo(a)';
          document.getElementById('userNameHeader').textContent = profile.name || '';
          document.getElementById('userAvatarHeader').textContent = (profile.name || 'C')[0].toUpperCase();
          this.refreshDashboard();
        } catch (e) { console.error(e); }
      }

      showAuth() { document.getElementById('authShell').style.display = 'flex'; document.getElementById('appShell').style.display = 'none'; }
      showApp() { document.getElementById('authShell').style.display = 'none'; document.getElementById('appShell').style.display = 'flex'; }

      async login() {
        const email = document.getElementById('loginEmail').value.trim().toLowerCase();
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) return alert('Preencha todos os campos');
        try { await auth.signInWithEmailAndPassword(email, password); } catch (e) { alert('Erro: ' + e.message); }
      }
      async signup() {
        const name = document.getElementById('signupName').value.trim();
        const email = document.getElementById('signupEmail').value.trim().toLowerCase();
        const phone = document.getElementById('signupPhone').value.trim();
        const region = document.getElementById('signupRegion').value.trim();
        const password = document.getElementById('signupPassword').value;
        if (!name || !email || !phone || !password) return alert('Preencha todos os campos');
        try {
          const cred = await auth.createUserWithEmailAndPassword(email, password);
          await db.ref('users/' + cred.user.uid).set({ id: cred.user.uid, name, email, phone, region, role: 'client', createdAt: new Date().toISOString() });
        } catch (e) { alert('Erro: ' + e.message); }
      }
      showLogin() { document.getElementById('loginCard').style.display = 'block'; document.getElementById('signupCard').style.display = 'none'; }
      showSignup() { document.getElementById('loginCard').style.display = 'none'; document.getElementById('signupCard').style.display = 'block'; }
      async logout() { try { await auth.signOut(); } finally { location.reload(); } }

      setupListeners() {
        EventDB.on('professionals', profs => { this.professionals = profs; this.renderMasonry(); });
        EventDB.on('requests', reqs => {
          if (!this.currentUser) return;
          this.myRequests = reqs.filter(r => r.clientId === this.currentUser.id);
          this.renderTimeline();
          this.refreshDashboard();
        });
      }

      refreshDashboard() {
        const active = this.myRequests.filter(r => r.status === 'active').length;
        const completed = this.myRequests.filter(r => r.status === 'completed').length;
        document.getElementById('statProf').textContent = this.professionals.length;
        document.getElementById('statReqs').textContent = this.myRequests.length;
        document.getElementById('statActive').textContent = active;
        document.getElementById('statDone').textContent = completed;
      }

      initials(name) { const parts = String(name || '?').trim().split(/\s+/); return ((parts[0]?.[0] || '') + (parts[1]?.[0] || '')).toUpperCase() || '♥'; }

      vendorCardHTML(p) {
        return `
          <div class="vendor-card-masonry" onclick="app.showProfessionalDetails('${this.safeId(p.id)}')">
            <div class="monogram">${this.escape(this.initials(p.name))}</div>
            <h4>${this.escape(p.name)}</h4>
            <p>${this.escape(p.specialties?.join(', ') || 'Fornecedor')}</p>
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <span class="price-tag">${p.priceFrom ? `R$ ${this.escape(p.priceFrom)}` : 'Sob consulta'}</span>
              <span style="color:var(--gold);font-size:0.8rem;">★ ${p.rating || 'Novo'}</span>
            </div>
          </div>
        `;
      }

      renderMasonry() {
        const grid = document.getElementById('professionalsGrid');
        if (!this.professionals.length) { grid.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--gray-500);width:100%;">Nenhum fornecedor encontrado.</div>'; return; }
        grid.innerHTML = this.professionals.map(p => this.vendorCardHTML(p)).join('');
      }
      filterProfessionals() {
        const kw = document.getElementById('searchKeyword').value.toLowerCase().trim();
        const filtered = this.professionals.filter(p => p.name.toLowerCase().includes(kw) || (p.specialties || []).some(s => s.toLowerCase().includes(kw)));
        const grid = document.getElementById('professionalsGrid');
        if (!filtered.length) { grid.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--gray-500);">Nenhum resultado.</div>'; return; }
        grid.innerHTML = filtered.map(p => this.vendorCardHTML(p)).join('');
      }

      renderTimeline() {
        const box = document.getElementById('recentRequestsList');
        if (!this.myRequests.length) { box.innerHTML = '<div style="padding:1rem;color:var(--gray-500);">Nenhuma solicitação ainda. Comece buscando um fornecedor!</div>'; return; }
        const labels = { pending: 'Pendente', active: 'Aceita', completed: 'Concluída' };
        const sorted = [...this.myRequests].sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
        box.innerHTML = sorted.slice(0, 5).map(r => `
          <div class="timeline-item">
            <div class="date">${new Date(r.date).toLocaleDateString('pt-BR')}</div>
            <div class="content">
              <strong>${this.escape(r.description)}</strong>
              <div class="meta">
                <span>💼 ${this.escape(r.professionalName)}</span>
                <span>💰 R$ ${this.escape(r.budget)}</span>
                <span class="badge-status ${r.status}">${labels[r.status]}</span>
              </div>
            </div>
          </div>
        `).join('');
      }

      showProfessionalDetails(id) {
        const p = this.professionals.find(x => x.id === id);
        if (!p) return;
        this.selectedProfessional = p;
        document.getElementById('professionalDetails').innerHTML = `
          <div class="modal-header">${this.escape(p.name)}</div>
          <p>${this.escape(p.bio || p.description || 'Fornecedor especializado em casamentos.')}</p>
          <div style="margin:1rem 0;"><strong>Especialidades:</strong> ${(p.specialties||[]).map(s=>`<span style="background:var(--gray-100);padding:0.2rem 0.6rem;border-radius:999px;font-size:0.8rem;display:inline-block;margin:0.2rem;">${this.escape(s)}</span>`).join(' ')}</div>
          <button class="dock-item" style="background:var(--primary);color:white;width:100%;justify-content:center;padding:0.8rem;border-radius:999px;" onclick="app.closeModal('professionalModal'); app.openRequestModal('${this.safeId(p.id)}')">Solicitar orçamento</button>
          <button class="dock-item" style="width:100%;justify-content:center;margin-top:0.5rem;" onclick="app.closeModal('professionalModal')">Fechar</button>
        `;
        this.openModal('professionalModal');
      }

      openRequestModal(id) {
        if (id) { const p = this.professionals.find(x => x.id === id); if (p) this.selectedProfessional = p; }
        if (!this.selectedProfessional) return alert('Selecione um fornecedor primeiro.');
        document.getElementById('requestModal').classList.add('show');
      }
      async createRequest() {
        const desc = document.getElementById('requestDesc').value.trim();
        const date = document.getElementById('requestDate').value;
        const loc = document.getElementById('requestLocation').value.trim();
        const budget = document.getElementById('requestBudget').value;
        if (!desc || !date || !loc || !budget) return alert('Preencha todos os campos.');
        const req = {
          id: Date.now().toString(),
          clientId: this.currentUser.id,
          clientName: this.currentUser.name,
          professionalId: this.selectedProfessional.id,
          professionalName: this.selectedProfessional.name,
          description: desc,
          date,
          location: loc,
          budget,
          details: document.getElementById('requestDetails').value,
          status: 'pending',
          createdAt: new Date().toISOString()
        };
        await EventDB.set('requests', req);
        this.showToast('✅ Solicitação enviada!');
        this.closeModal('requestModal');
        this.selectedProfessional = null;
      }

      openModal(id) { document.getElementById(id).classList.add('show'); }
      closeModal(id) { document.getElementById(id).classList.remove('show'); }
      showToast(msg) {
        const t = document.getElementById('toast');
        document.getElementById('toastMsg').textContent = msg;
        t.className = 'toast show';
        setTimeout(() => t.classList.remove('show'), 3000);
      }
    }

    const app = new ClientApp();
    app.boot();

    document.querySelectorAll('.dock-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.dock-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        if (item.getAttribute('data-section') === 'searchProfessionals') app.filterProfessionals();
      });
    });

    document.querySelectorAll('.modal').forEach(m => m.addEventListener('click', (e) => { if (e.target === m) app.closeModal(m.id); }));
  </script>
</body>
</html>
